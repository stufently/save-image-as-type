<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 300px; height: 188px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; align-items: center; justify-content: center; }

.card {
  text-align: center;
  color: #fff;
}

h1 {
  font-size: 16px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 10px;
}

.formats {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 10px;
}

.fmt {
  background: #4A90D9;
  color: #fff;
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
}

.sub {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
}
</style>
</head>
<body>
  <div class="card">
    <h1>Save Image As<br>Any Format</h1>
    <div class="formats">
      <div class="fmt">PNG</div>
      <div class="fmt">JPG</div>
      <div class="fmt">WebP</div>
      <div class="fmt">AVIF</div>
    </div>
    <div class="sub">Right-click &rarr; Convert &rarr; Download</div>
  </div>
</body>
</html>
