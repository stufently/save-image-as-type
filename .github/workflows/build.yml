name: Build

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
      options: --ipc=host
    steps:
      - uses: actions/checkout@v7

      - name: Install Playwright library
        run: npm install --no-save playwright@1.59.1

      - name: Run extension smoke test
        run: EXT_PATH="$PWD/extension" node tests/smoke-test.js

  build:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Get version from manifest
        id: version
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version extension/manifest.json)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # Single ZIP works for Chrome, Edge and Opera (extension name ≤50 chars)
      - name: Build extension ZIP
        run: cd extension && zip -r ../save-image-as-type-${{ steps.version.outputs.VERSION }}.zip . -x '*.DS_Store' '*.git*'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-zip-${{ steps.version.outputs.VERSION }}
          path: save-image-as-type-${{ steps.version.outputs.VERSION }}.zip
          if-no-files-found: error
