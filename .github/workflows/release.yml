name: Release

# Tag push (v1.2.3) → build ZIP → GitHub Release → publish to Chrome Web Store
# (publish runs only when the CWS_EXTENSION_ID repository variable is set).
# Edge Add-ons and Opera are still updated manually from the release ZIP.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, e.g. v1.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Get version from tag
        id: version
        run: |
          set -euo pipefail
          REF="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          set -euo pipefail
          MANIFEST_VERSION=$(jq -r .version extension/manifest.json)
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      # Single ZIP works for Chrome, Edge and Opera (extension name ≤50 chars)
      - name: Build extension ZIP
        run: cd extension && zip -r ../save-image-as-type-${{ steps.version.outputs.VERSION }}.zip . -x '*.DS_Store' '*.git*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: save-image-as-type-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true

      - name: Upload artifact for publish job
        uses: actions/upload-artifact@v7
        with:
          name: chrome-zip
          path: save-image-as-type-${{ steps.version.outputs.VERSION }}.zip
          if-no-files-found: error
          retention-days: 14

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ vars.CWS_EXTENSION_ID != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chrome-zip
          path: chrome-build

      - name: Locate ZIP
        id: zip
        run: |
          set -euo pipefail
          ZIP="$(ls chrome-build/*.zip | head -1)"
          test -s "$ZIP"
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload + publish
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ vars.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
